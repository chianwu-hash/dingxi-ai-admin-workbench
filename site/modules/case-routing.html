  <main>
    <section class="page-title"><div class="wrap"><p class="eyebrow">Module 3</p><h1>行政案件類型路由</h1><p>AI 行政工作臺不能只有一個萬用 prompt。先分類案件，再套用對應規則。</p></div></section>
    <section class="section">
      <div class="wrap">
        <div class="section-head"><h2>路由表讓 AI 不亂套格式</h2><p>每個案件類型都要有判斷線索、必讀規則、禁止誤用、預設輸出與人工確認條件。</p></div>
        <div class="grid three">
          <article class="card"><h3>分類</h3><p>先判斷是場地借用、會議紀錄、活動通知、行事曆操作或一般行政。</p></article>
          <article class="card"><h3>規則</h3><p>每類案件讀自己的規則，不把所有任務混成同一格式。</p></article>
          <article class="card"><h3>確認</h3><p>個資、正式紀錄、主管相關或資料不足時，等待人工確認。</p></article>
        </div>
